<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ArbAngel — dealing desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:        #0d1320;   /* deep navy base, not pure black */
    --ink-2:      #131b2c;
    --surface:    #18223A;
    --surface-2:  #1f2b46;
    --line:       #2a3a5c;
    --paper:      #e9e7df;   /* warm off-white text */
    --muted:      #8595b4;
    --gold:       #f0a92b;   /* live opportunity */
    --gold-soft:  #f0a92b22;
    --teal:       #3fcf9a;   /* locked / flat / safe */
    --teal-soft:  #3fcf9a1f;
    --coral:      #f0584e;   /* unwind / kill / danger */
    --coral-soft: #f0584e1f;
    --azure:      #5b9df0;   /* value bet — variance, not guaranteed */
    --azure-soft: #5b9df01f;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--ink); color: var(--paper);
    font-family: 'Inter', system-ui, sans-serif; line-height: 1.45;
    background-image: radial-gradient(900px 500px at 85% -10%, #1a2742 0%, transparent 60%);
    min-height: 100vh;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }

  /* ---- desk bar: safety state is a hero, sits up top always visible ---- */
  .desk {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 14px 20px; background: rgba(13,19,32,0.9);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
  }
  .brand { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.02em;
    font-size: 19px; margin-right: 4px; }
  .brand b { color: var(--gold); }
  .brand small { display:block; font-family:'Inter'; font-weight:500; font-size:10.5px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: -2px; }

  /* ---- app switcher: hop between the two dashboards ---- */
  .appnav { display: flex; gap: 2px; padding: 3px; border-radius: 11px;
    background: #ffffff0a; border: 1px solid var(--line); }
  .appnav a { font-family:'Inter'; font-weight: 600; font-size: 12.5px; text-decoration: none;
    padding: 6px 13px; border-radius: 8px; color: var(--muted); transition: .15s; white-space: nowrap; }
  .appnav a:hover { color: var(--paper); }
  .appnav a.current { color: var(--gold); background: var(--gold-soft); cursor: default; }

  .stat { display: flex; flex-direction: column; gap: 1px; }
  .stat .k { font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }
  .stat .v { font-size: 16px; font-weight: 600; }

  .pill { padding: 4px 11px; border-radius: 999px; font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.04em; border: 1px solid transparent; white-space: nowrap; }
  .pill.flat   { color: var(--teal); background: var(--teal-soft); border-color: #3fcf9a44; }
  .pill.exposed{ color: var(--coral); background: var(--coral-soft); border-color: #f0584e44; }
  .pill.dry    { color: var(--gold); background: var(--gold-soft); border-color: #f0a92b44; }
  .pill.live   { color: var(--coral); background: var(--coral-soft); border-color: #f0584e66; }
  .pill.conn   { color: var(--teal); background: var(--teal-soft); }
  .pill.off    { color: var(--muted); background: #ffffff0d; }
  .pill.real   { color: var(--teal); background: var(--teal-soft); border-color: #3fcf9a44; }
  .pill.mock   { color: var(--muted); background: #ffffff0d; }

  .spacer { flex: 1 1 auto; }
  .kill {
    font-family: 'Inter'; font-weight: 600; font-size: 13px; cursor: pointer;
    padding: 9px 16px; border-radius: 9px; border: 1px solid #f0584e66;
    background: var(--coral-soft); color: var(--coral); transition: .15s;
  }
  .kill:hover { background: #f0584e30; }
  .kill.armed { background: var(--coral); color: #fff; border-color: var(--coral); }

  /* ---- layout ---- */
  .wrap { max-width: 1080px; margin: 0 auto; padding: 26px 20px 60px; }
  .eyebrow { font-family:'Inter'; font-weight:600; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 14px; }

  .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 720px) { .grid { grid-template-columns: 1fr 1fr; } }

  /* ---- arb card: the signature ---- */
  .card {
    background: linear-gradient(180deg, var(--surface) 0%, var(--ink-2) 100%);
    border: 1px solid var(--line); border-radius: 16px; padding: 18px;
    position: relative; overflow: hidden;
  }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--gold); }
  .card.busy::before { background: var(--muted); }
  .card.done::before  { background: var(--teal); }
  .card.fail::before  { background: var(--coral); }
  .card.value::before { background: var(--azure); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .market { font-family:'Archivo'; font-weight: 700; font-size: 16.5px; letter-spacing: -0.01em; }
  .market small { display:block; font-family:'IBM Plex Mono'; font-weight:400; font-size: 11px;
    color: var(--muted); letter-spacing: 0.02em; margin-top: 3px; }

  .margin { text-align: right; flex-shrink: 0; }
  .margin .num { font-family:'IBM Plex Mono'; font-weight: 600; font-size: 30px; line-height: 1;
    color: var(--gold); }
  .margin .num.edge { color: var(--azure); }
  .margin .lbl { font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); margin-top:4px; }
  .unverified { display:inline-block; margin-top:6px; font-size: 10px; letter-spacing: 0.04em;
    color: var(--gold); background: var(--gold-soft); border: 1px solid #f0a92b44;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap; }

  .vbet-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: baseline;
    padding: 10px 0; border-top: 1px solid var(--line); margin-top: 14px; }
  .vbet-row .pick { font-weight: 600; font-size: 14px; }
  .vbet-row .pick span { display:block; font-size: 11.5px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .vbet-row .price { font-family:'IBM Plex Mono'; font-size: 15px; text-align: right; }
  .fire.value { background: var(--azure); color: #06121f; }
  .ev-note { font-size: 11.5px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  .legs { margin: 16px 0 6px; border-top: 1px solid var(--line); }
  .leg { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: baseline;
    padding: 8px 0; border-bottom: 1px dashed #2a3a5c66; }
  .leg .out { font-weight: 600; font-size: 13.5px; }
  .leg .out span { display:block; font-size: 11px; color: var(--muted); font-weight: 500; }
  .leg .odds { font-family:'IBM Plex Mono'; font-size: 14px; color: var(--paper); }
  .leg .stake { font-family:'IBM Plex Mono'; font-size: 13px; color: var(--teal); min-width: 64px; text-align: right; }

  .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 12px; }
  .profit { font-size: 12.5px; color: var(--muted); }
  .profit b { font-family:'IBM Plex Mono'; color: var(--teal); font-weight: 600; }

  .fire { font-family:'Inter'; font-weight: 700; font-size: 13px; letter-spacing: 0.02em;
    cursor: pointer; padding: 10px 18px; border-radius: 10px; border: none;
    background: var(--gold); color: #1a1206; transition: .15s; }
  .fire:hover { filter: brightness(1.08); }
  .fire:disabled { background: var(--surface-2); color: var(--muted); cursor: default; }

  .statusline { font-family:'IBM Plex Mono'; font-size: 12px; margin-top: 6px; }
  .statusline.done { color: var(--teal); }
  .statusline.fail { color: var(--coral); }
  .statusline.busy { color: var(--muted); }

  .empty { border: 1px dashed var(--line); border-radius: 16px; padding: 40px 24px; text-align: center;
    color: var(--muted); grid-column: 1 / -1; }
  .empty h3 { font-family:'Archivo'; color: var(--paper); margin: 0 0 6px; font-size: 17px; }

  /* ---- ledger ---- */
  .ledger { margin-top: 34px; }
  .row { display: grid; grid-template-columns: 78px 1fr auto; gap: 12px; align-items: baseline;
    padding: 9px 0; border-bottom: 1px solid #2a3a5c55; font-size: 13px; }
  .tag { font-family:'IBM Plex Mono'; font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em;
    padding: 2px 7px; border-radius: 5px; text-align: center; }
  .tag.EXECUTED, .tag.PARTIAL_FILL { color: var(--teal); background: var(--teal-soft); }
  .tag.UNWOUND, .tag.KILL_SWITCH, .tag.REJECTED { color: var(--coral); background: var(--coral-soft); }
  .tag.ABORTED, .tag.BLOCKED, .tag.KILL_SWITCH_CLEARED { color: var(--gold); background: var(--gold-soft); }
  .row .desc { color: var(--paper); }
  .row .desc small { color: var(--muted); }
  .row .when { font-family:'IBM Plex Mono'; font-size: 11px; color: var(--muted); }
  .note { font-size: 12px; color: var(--muted); margin-top: 10px; }

  /* ---- tabs: arb vs value bet are different risk shapes, kept visually separate ---- */
  .tabs { display: flex; gap: 8px; margin: 4px 0 16px; }
  .tab { font-family:'Inter'; font-weight: 600; font-size: 13.5px; cursor: pointer;
    padding: 9px 16px; border-radius: 10px; border: 1px solid var(--line);
    background: transparent; color: var(--muted); transition: .15s;
    display: flex; align-items: center; gap: 8px; }
  .tab:hover { color: var(--paper); border-color: #3a4d75; }
  .tab .count { font-family:'IBM Plex Mono'; font-size: 11px; padding: 1px 7px;
    border-radius: 999px; background: #ffffff14; }
  .tab.active[data-tab="arb"]   { color: var(--gold); border-color: #f0a92b55; background: var(--gold-soft); }
  .tab.active[data-tab="value"] { color: var(--azure); border-color: #5b9df055; background: var(--azure-soft); }
  .tab.active .count { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>
  <div class="desk">
    <div class="brand">Arb<b>Angel</b><small>dealing desk</small></div>
    <nav class="appnav">
      <a class="current">ArbAngel</a>
      <a href="https://fxangel-web.vercel.app/" target="_top">FXAngel</a>
    </nav>
    <div class="stat"><span class="k">Net exposure</span><span class="v" id="exposure">—</span></div>
    <div id="flatPill" class="pill flat">FLAT</div>
    <div id="modePill" class="pill dry">DRY RUN</div>
    <div id="sourcePill" class="pill mock">MOCK FEED</div>
    <div id="connPill" class="pill off">connecting…</div>
    <div class="spacer"></div>
    <button id="killBtn" class="kill">Kill switch</button>
  </div>

  <div class="wrap">
    <div class="tabs">
      <button class="tab active" data-tab="arb" id="tabArb" onclick="switchTab('arb')">
        Arbitrage <span class="count" id="arbCount">0</span>
      </button>
      <button class="tab" data-tab="value" id="tabValue" onclick="switchTab('value')">
        Value Bets <span class="count" id="valueCount">0</span>
      </button>
    </div>
    <p class="eyebrow" id="eyebrow">Live arbs · after 2% commission · Smarkets / Matchbook / Betdaq</p>
    <div id="arbGrid" class="grid"></div>
    <div id="valueGrid" class="grid" style="display:none"></div>

    <div class="ledger">
      <p class="eyebrow">Execution ledger</p>
      <div id="ledger"></div>
      <p class="note" id="ledgerNote"></p>
    </div>
  </div>

<script>
const API = 'https://arbangel-backend-production.up.railway.app';
let connected = false, busy = {}, results = {}, vbusy = {}, vresults = {}, activeTab = 'arb';

function fmtMoney(n){ return (n<0?'-':'') + '€' + Math.abs(n).toFixed(2); }

function switchTab(tab){
  activeTab = tab;
  document.getElementById('tabArb').classList.toggle('active', tab === 'arb');
  document.getElementById('tabValue').classList.toggle('active', tab === 'value');
  document.getElementById('arbGrid').style.display = tab === 'arb' ? '' : 'none';
  document.getElementById('valueGrid').style.display = tab === 'value' ? '' : 'none';
  refresh();
}

function render(data){
  const { arbs = [], valueBets = [], state = {}, source = 'mock' } = data;
  document.getElementById('arbCount').textContent = arbs.length;
  document.getElementById('valueCount').textContent = valueBets.length;
  // desk
  document.getElementById('exposure').textContent = fmtMoney(state.netExposure ?? 0);
  const flat = (state.netExposure ?? 0) === 0;
  const fp = document.getElementById('flatPill');
  fp.className = 'pill ' + (flat ? 'flat' : 'exposed'); fp.textContent = flat ? 'FLAT' : 'EXPOSED';
  const mp = document.getElementById('modePill');
  mp.className = 'pill ' + (state.dryRun ? 'dry' : 'live'); mp.textContent = state.dryRun ? 'DRY RUN' : 'LIVE — REAL MONEY';
  const sp = document.getElementById('sourcePill');
  sp.className = 'pill ' + (source === 'real' ? 'real' : 'mock');
  sp.textContent = source === 'real' ? 'REAL ODDS · read-only' : 'MOCK FEED';
  document.getElementById('eyebrow').textContent = activeTab === 'arb'
    ? (source === 'real'
        ? 'Real Smarkets/Matchbook prices · Betdaq not covered · depth unverified'
        : 'After 2% commission · Smarkets / Matchbook / Betdaq (mock)')
    : 'Pinnacle (read-only) as fair-price reference · single-sided · wins on average, not every time';
  const kb = document.getElementById('killBtn');
  kb.className = 'kill ' + (state.killSwitch ? 'armed' : '');
  kb.textContent = state.killSwitch ? 'Kill switch ON' : 'Kill switch';

  // arb cards
  const grid = document.getElementById('arbGrid');
  if (!arbs.length) {
    grid.innerHTML = `<div class="empty"><h3>No arbs right now</h3>
      Prices across the three exchanges are too aligned to lock a profit after commission.
      The desk is scanning every couple of seconds — fillable arbs will surface here.</div>`;
  } else {
    grid.innerHTML = arbs.map(a => {
      const r = results[a.marketId]; const isBusy = busy[a.marketId];
      const cls = isBusy ? 'busy' : r ? (r.type==='EXECUTED'?'done':'fail') : '';
      const legs = a.legs.map(l => `<div class="leg">
        <div class="out">${l.outcome}<span>${l.exchangeName}</span></div>
        <div class="odds">${l.price.toFixed(2)}</div>
        <div class="stake">${fmtMoney(l.stake)}</div></div>`).join('');
      let status = '';
      if (isBusy) status = `<div class="statusline busy">placing legs concurrently…</div>`;
      else if (r) {
        if (r.type==='EXECUTED') status = `<div class="statusline done">✓ locked · profit ${fmtMoney(r.profit)} · flat</div>`;
        else if (r.type==='UNWOUND') status = `<div class="statusline fail">⤺ leg failed (${r.reason}) · unwound to flat · cost ${fmtMoney(r.unwindCost)}</div>`;
        else if (r.type==='ABORTED') status = `<div class="statusline fail">↯ ${r.reason}</div>`;
        else if (r.type==='BLOCKED') status = `<div class="statusline fail">⛔ ${r.reason}</div>`;
      }
      return `<div class="card ${cls}">
        <div class="card-top">
          <div class="market">${a.label}<small>${a.marketId}</small></div>
          <div class="margin"><div class="num">${a.marginPct.toFixed(2)}%</div><div class="lbl">locked margin</div>
            ${a.liquidityUnknown ? '<div class="unverified">depth unverified</div>' : ''}</div>
        </div>
        <div class="legs">${legs}</div>
        <div class="card-foot">
          <div class="profit">stake <b>${fmtMoney(a.totalStake)}</b> → profit <b>${fmtMoney(a.profit)}</b></div>
          <button class="fire" ${isBusy?'disabled':''} onclick="fire('${a.marketId}')">${isBusy?'Firing…':'Fire'}</button>
        </div>
        ${status}
      </div>`;
    }).join('');
  }

  // value bet cards
  const vgrid = document.getElementById('valueGrid');
  if (!valueBets.length) {
    vgrid.innerHTML = `<div class="empty"><h3>No value bets right now</h3>
      Nothing on Smarkets/Matchbook/Betdaq is currently paying more than the Pinnacle-derived
      fair price by enough margin to clear the minimum edge threshold. These show up more often
      than arbs — a value bet doesn't need two books to disagree, just one to be wrong.</div>`;
  } else {
    vgrid.innerHTML = valueBets.map(v => {
      const key = v.marketId + ':' + v.outcome;
      const r = vresults[key]; const isBusy = vbusy[key];
      const cls = isBusy ? 'busy' : r ? (r.type==='EXECUTED'||r.type==='PARTIAL_FILL'?'done':'fail') : '';
      let status = '';
      if (isBusy) status = `<div class="statusline busy">placing…</div>`;
      else if (r) {
        if (r.type==='EXECUTED') status = `<div class="statusline done">✓ placed · ${fmtMoney(r.matched)} matched at this edge</div>`;
        else if (r.type==='PARTIAL_FILL') status = `<div class="statusline done">◐ partially matched · ${fmtMoney(r.matched)} of stake</div>`;
        else if (r.type==='REJECTED') status = `<div class="statusline fail">✕ rejected — nothing placed, nothing at risk</div>`;
        else if (r.type==='ABORTED') status = `<div class="statusline fail">↯ ${r.reason}</div>`;
        else if (r.type==='BLOCKED') status = `<div class="statusline fail">⛔ ${r.reason}</div>`;
      }
      return `<div class="card value ${cls}">
        <div class="card-top">
          <div class="market">${v.label}<small>${v.marketId}</small></div>
          <div class="margin"><div class="num edge">+${v.edgePct.toFixed(2)}%</div><div class="lbl">edge vs fair price</div>
            ${v.liquidityUnknown ? '<div class="unverified">depth unverified</div>' : ''}</div>
        </div>
        <div class="vbet-row">
          <div class="pick">${v.outcome}<span>${v.exchangeName} · fair prob ${(v.fairProb*100).toFixed(1)}%</span></div>
          <div class="price">${v.price.toFixed(2)}</div>
        </div>
        <div class="card-foot">
          <div class="profit">stake <b>${fmtMoney(v.stake)}</b> → expected <b>${fmtMoney(v.expectedProfit)}</b> (average, not guaranteed)</div>
          <button class="fire value" ${isBusy?'disabled':''} onclick="fireValue('${v.marketId}','${v.outcome}')">${isBusy?'Firing…':'Fire'}</button>
        </div>
        ${status}
      </div>`;
    }).join('');
  }

  // ledger
  const led = document.getElementById('ledger');
  const h = state.history || [];
  led.innerHTML = h.length ? h.map(e => {
    const t = new Date(e.at).toLocaleTimeString();
    let desc = e.label || e.marketId || '';
    if (e.type==='EXECUTED' && e.profit !== undefined) desc += ` <small>· arb +${fmtMoney(e.profit)} · ${e.marginPct}%</small>`;
    else if (e.type==='EXECUTED' && e.matched !== undefined) desc += ` <small>· value bet on ${e.outcome} · ${fmtMoney(e.matched)} matched · edge ${e.edgePct}%</small>`;
    else if (e.type==='PARTIAL_FILL') desc += ` <small>· value bet on ${e.outcome} · only ${fmtMoney(e.matched)} matched</small>`;
    else if (e.type==='REJECTED') desc += ` <small>· value bet on ${e.outcome} · rejected, nothing placed</small>`;
    else if (e.type==='UNWOUND') desc += ` <small>· ${e.reason} · exit ${fmtMoney(e.unwindCost)}</small>`;
    else if (e.type==='ABORTED'||e.type==='BLOCKED'||e.type==='KILL_SWITCH'||e.type==='KILL_SWITCH_CLEARED') desc = `<small>${e.reason||''}</small>`;
    return `<div class="row"><span class="tag ${e.type}">${e.type.replace('_',' ')}</span>
      <span class="desc">${desc}</span><span class="when">${t}</span></div>`;
  }).join('') : `<div class="note">No executions yet. Fire an arb or a value bet to see it recorded here.</div>`;
}

async function fire(marketId){
  if (!connected) { results[marketId] = { type:'BLOCKED', reason:'backend offline — start the server' }; refresh(); return; }
  busy[marketId] = true; refresh();
  try {
    const res = await fetch(`${API}/api/execute/${marketId}`, { method:'POST' });
    results[marketId] = await res.json();
  } catch (e) { results[marketId] = { type:'BLOCKED', reason:'request failed' }; }
  busy[marketId] = false; refresh();
}

async function fireValue(marketId, outcome){
  const key = marketId + ':' + outcome;
  if (!connected) { vresults[key] = { type:'BLOCKED', reason:'backend offline — start the server' }; refresh(); return; }
  vbusy[key] = true; refresh();
  try {
    const res = await fetch(`${API}/api/execute-value/${marketId}/${encodeURIComponent(outcome)}`, { method:'POST' });
    vresults[key] = await res.json();
  } catch (e) { vresults[key] = { type:'BLOCKED', reason:'request failed' }; }
  vbusy[key] = false; refresh();
}

document.getElementById('killBtn').onclick = async () => {
  if (!connected) return;
  const cur = document.getElementById('killBtn').classList.contains('armed');
  await fetch(`${API}/api/kill-switch`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ on: !cur }) });
};

let lastData = { arbs: [], valueBets: [], state: {} };
function refresh(){ render(lastData); }

// Live stream; fall back to clearly-labelled sample if backend is down so the
// desk is still legible offline.
function connect(){
  try {
    const es = new EventSource(`${API}/api/stream`);
    es.onmessage = (m) => { connected = true; setConn(true); lastData = JSON.parse(m.data); render(lastData); };
    es.onerror = () => { if (!connected) showSample(); };
  } catch { showSample(); }
  setTimeout(() => { if (!connected) showSample(); }, 2200);
}
function setConn(on){
  const c = document.getElementById('connPill');
  c.className = 'pill ' + (on?'conn':'off');
  c.textContent = on ? 'live' : 'sample (backend offline)';
  document.getElementById('ledgerNote').textContent = on ? '' :
    'Showing sample data. Run the backend (npm install && npm start) and reload to go live.';
}
function showSample(){
  setConn(false);
  lastData = { arbs: [{
    marketId:'epl-mci-liv', label:'Man City vs Liverpool', marginPct:1.92, totalStake:100, profit:1.92,
    legs:[ {outcome:'Home',exchangeName:'Smarkets',price:2.30,stake:44.82},
           {outcome:'Draw',exchangeName:'Matchbook',price:3.70,stake:27.96},
           {outcome:'Away',exchangeName:'Betdaq',price:3.80,stake:27.22} ]
